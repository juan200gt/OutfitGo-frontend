<div class="container mx-auto px-4 py-12 flex justify-center items-center">
  <div class="card bg-base-100 shadow-xl border border-base-200 w-full max-w-2xl">
    <div class="card-body">
      
      <div class="alert alert-success shadow-sm mb-6 flex justify-center text-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        <span class="text-xl font-semibold">{{ successMessage() }}</span>
      </div>

      <h2 class="card-title text-2xl mb-4 border-b border-base-200 pb-2 justify-center">
        Pedido #{{ order().id }}
      </h2>

      <div class="flex flex-col gap-4 mt-2">
        @for (item of order().order_items; track item.id) {
          <div class="flex items-center gap-4 bg-base-200 p-3 rounded-lg">
            <img [src]="item.producto.url_imagen_principal" [alt]="item.producto.nombre" class="w-16 h-16 object-cover rounded-md shadow-sm" />
            <div class="flex-1">
              <h3 class="font-medium text-lg">{{ item.producto.nombre }}</h3>
              <p class="text-sm opacity-70">Cantidad: {{ item.cantidad }}</p>
            </div>
            <div class="font-bold text-lg">
              {{ item.precio_unitario | currency:'EUR' }}
            </div>
          </div>
        }
      </div>

      <div class="flex justify-between items-center mt-6 border-t border-base-200 pt-6">
        <span class="text-xl font-medium">Total Pagado:</span>
        <span class="text-3xl font-bold text-primary">{{ order().total | currency:'EUR' }}</span>
      </div>

      <div class="card-actions justify-center mt-8">
        <button routerLink="/" class="btn btn-primary btn-wide">Volver a la tienda</button>
      </div>

    </div>
  </div>
</div>

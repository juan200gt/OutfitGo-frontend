@if (product(); as p) {
    <app-product-detail-info 
        [product]="p"
        (addToCart)="handleAddToCart($event)"
    />

    <div class="container mx-auto p-4 pb-20">
        <app-product-reviews [reviews]="p.resenas || []" />
    </div>
} @else {
    <div class="container mx-auto p-4 py-10 text-center">
        <span class="loading loading-spinner loading-lg text-primary"></span>
        <p class="mt-4 text-xl">Cargando detalles del producto...</p>
    </div>
}

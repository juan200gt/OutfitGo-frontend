<div class="container mx-auto px-4 py-12">
    <h1 class="text-4xl font-black mb-12 italic uppercase tracking-tighter">{{ 'PROFILE.TITLE' | translate }}</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
        <div class="lg:col-span-1 space-y-8">
            <div class="bg-base-100 p-8 rounded-3xl shadow-xl border border-base-200">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                    <span class="w-2 h-8 bg-primary rounded-full"></span>
                    {{ 'PROFILE.PERSONAL_DATA' | translate }}
                </h2>
                <app-profile-form [user]="authService.currentUser()!" [isLoading]="isLoading()"
                    [successMessage]="successMessage()" [errorMessage]="errorMessage()"
                    (updateProfile)="handleUpdate($event)" />
            </div>
        </div>

        <div class="lg:col-span-2 space-y-8">
            <div class="bg-base-100 p-8 rounded-3xl shadow-xl border border-base-200">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                    <span class="w-2 h-8 bg-secondary rounded-full"></span>
                    {{ 'PROFILE.ADDRESSES' | translate }}
                </h2>
                <app-address-selector />
            </div>
        </div>
    </div>
</div>

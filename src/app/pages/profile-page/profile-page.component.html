<div class="container mx-auto px-4 py-8 max-w-2xl">
    <h1 class="text-3xl font-bold mb-6">Mi Perfil</h1>

    <app-profile-form [user]="authService.currentUser()" [isLoading]="isLoading()" [successMessage]="successMessage()"
        [errorMessage]="errorMessage()" (submitProfile)="handleUpdate($event)">
    </app-profile-form>

    <div class="divider my-8"></div>

    <div class="bg-base-100 p-6 rounded-box shadow">
        <h2 class="text-xl font-semibold mb-4 border-b pb-2">Mis Direcciones</h2>
        <p class="text-sm text-gray-500 mb-4">Gestiona tus direcciones de envío. Puedes añadir nuevas o establecer tu
            dirección principal.</p>

        <app-address-selector></app-address-selector>
    </div>

</div>

<div class="hero bg-base-200 min-h-screen">
  <div class="hero-content flex-col w-full">
    <div class="card bg-base-100 w-full max-w-lg shrink-0 shadow-2xl">
      <div class="card-body">
        <h2 class="card-title text-2xl font-bold justify-center mb-4">Restablecer contraseña</h2>
        <p class="text-sm text-center mb-6">Introduce y confirma tu nueva contraseña.</p>

        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
          @if (errorMessage()) {
          <div class="alert alert-error mb-4">
            <span>{{ errorMessage() }}</span>
          </div>
          }

          @if (successMessage()) {
          <div class="alert alert-success mb-4">
            <span>{{ successMessage() }}</span>
          </div>
          <div class="mt-4 text-center">
            <a routerLink="/login" class="btn btn-primary w-full">Ir al inicio de sesión</a>
          </div>
          } @else {
          <div class="form-control">
            <label class="label">
              <span class="label-text">Nueva contraseña</span>
            </label>
            <input type="password" formControlName="password" class="input input-bordered w-full"
              placeholder="Mínimo 8 caracteres" />
          </div>

          <div class="form-control mt-2">
            <label class="label">
              <span class="label-text">Confirmar nueva contraseña</span>
            </label>
            <input type="password" formControlName="password_confirmation" class="input input-bordered w-full"
              placeholder="Repite tu contraseña" />
          </div>

          <button type="submit" class="btn btn-neutral mt-6 w-full" [disabled]="resetForm.invalid || isLoading()">
            @if (isLoading()) {
            <span class="loading loading-spinner"></span>
            }
            Actualizar contraseña
          </button>
          }
        </form>
      </div>
    </div>
  </div>
</div>

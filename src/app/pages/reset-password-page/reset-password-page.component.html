<div class="hero bg-base-200 min-h-screen">
  <div class="hero-content flex-col w-full">
    <div class="card bg-base-100 w-full max-w-lg shrink-0 shadow-2xl">
      <div class="card-body">
        <h2 class="card-title text-2xl font-bold justify-center mb-4">{{ 'AUTH.RESET_PASSWORD_TITLE' | translate }}</h2>
        <p class="text-sm text-center mb-6">{{ 'AUTH.RESET_PASSWORD_INSTRUCTIONS' | translate }}</p>

        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
          @if (errorMessage()) {
          <div class="alert alert-error mb-4">
            <span>{{ errorMessage() }}</span>
          </div>
          }

          @if (successMessage()) {
          <div class="alert alert-success mb-4">
            <span>{{ successMessage() }}</span>
          </div>
          <div class="mt-4 text-center">
            <a routerLink="/login" class="btn btn-primary w-full">{{ 'AUTH.GO_TO_LOGIN' | translate }}</a>
          </div>
          } @else {
          <div class="form-control">
            <label class="label">
              <span class="label-text">{{ 'AUTH.NEW_PASSWORD' | translate }}</span>
            </label>
            <input type="password" formControlName="password" class="input input-bordered w-full"
              [placeholder]="'AUTH.NEW_PASSWORD_PLACEHOLDER' | translate" />
          </div>

          <div class="form-control mt-2">
            <label class="label">
              <span class="label-text">{{ 'AUTH.CONFIRM_PASSWORD' | translate }}</span>
            </label>
            <input type="password" formControlName="password_confirmation" class="input input-bordered w-full"
              [placeholder]="'AUTH.CONFIRM_PASSWORD_PLACEHOLDER' | translate" />
          </div>

          <button type="submit" class="btn btn-neutral mt-6 w-full" [disabled]="resetForm.invalid || isLoading()">
            @if (isLoading()) {
            <span class="loading loading-spinner"></span>
            }
            {{ 'AUTH.RESET_PASSWORD_BTN' | translate }}
          </button>
          }
        </form>
      </div>
    </div>
  </div>
</div>

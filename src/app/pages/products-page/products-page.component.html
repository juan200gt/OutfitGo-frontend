<div class="container mx-auto p-4 py-8">
    <h2 class="text-3xl font-bold mb-6 text-center">{{ pageTitle() | translate }}</h2>

    <div class="bg-base-200 p-4 rounded-xl mb-8 flex flex-col md:flex-row gap-4 justify-center items-center shadow-sm">
        <div class="form-control w-full max-w-xs">
            <label class="label"><span class="label-text font-semibold">{{ 'PRODUCTS.FILTERS.CATEGORY' | translate }}</span></label>
            <select class="select select-bordered w-full" (change)="updateFilter('categoria_id', $event)">
                <option value="">{{ 'PRODUCTS.FILTERS.ALL_CATEGORIES' | translate }}</option>
                @for(cat of availableCategories(); track cat.id) {
                    <option [value]="cat.id">{{ cat.nombre_localizado || cat.nombre }}</option>
                }
            </select>
        </div>
        
        <div class="form-control w-full max-w-xs">
            <label class="label"><span class="label-text font-semibold">{{ 'PRODUCTS.FILTERS.SIZE' | translate }}</span></label>
            <select class="select select-bordered w-full" (change)="updateFilter('talla', $event)">
                <option value="">{{ 'PRODUCTS.FILTERS.ALL_SIZES' | translate }}</option>
                @for(talla of availableSizes(); track talla.id) {
                    <option [value]="talla.nombre">{{ talla.nombre }}</option>
                }
            </select>
        </div>

        <div class="form-control w-full max-w-xs">
            <label class="label"><span class="label-text font-semibold">{{ 'PRODUCTS.FILTERS.COLOR' | translate }}</span></label>
            <select class="select select-bordered w-full" (change)="updateFilter('color', $event)">
                <option value="">{{ 'PRODUCTS.FILTERS.ALL_COLORS' | translate }}</option>
                @for(color of availableColors(); track color.id) {
                    <option [value]="color.nombre">{{ color.nombre }}</option>
                }
            </select>
        </div>

        <div class="form-control w-full max-w-xs">
            <label class="label"><span class="label-text font-semibold">{{ 'PRODUCTS.FILTERS.BRAND' | translate }}</span></label>
            <select class="select select-bordered w-full" (change)="updateFilter('marca_id', $event)">
                <option value="">{{ 'PRODUCTS.FILTERS.ALL_BRANDS' | translate }}</option>
                @for(marca of availableBrands(); track marca.id) {
                    <option [value]="marca.id">{{ marca.nombre }}</option>
                }
            </select>
        </div>
    </div>

    

    @if (isLoading()) {
        <div class="flex flex-col items-center justify-center py-20">
            <span class="loading loading-spinner loading-lg text-primary"></span>
            <p class="mt-4 font-medium opacity-70">Buscando productos...</p>
        </div>
    } @else {
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            @for (item of products(); track item.id) {
                <app-product-card [product]="item" (addToCart)="handleAddToCart($event)" />
            } @empty {
                <div class="col-span-full text-center py-10 bg-base-200 rounded-xl border border-base-300">
                    <div class="text-6xl mb-4">🔍</div>
                    <p class="text-xl opacity-70">{{ 'PRODUCTS.NO_PRODUCTS' | translate }}</p>
                    <button class="btn btn-primary mt-4" (click)="filters.set({ publico: '', talla: '', color: '', marca_id: '', categoria_id: '' })">
                        {{ 'COMMON.RELOAD' | translate }}
                    </button>
                </div>
            }
        </div>
    }
</div>

<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-8">Finalizar Compra</h1>

    <div class="flex flex-col lg:flex-row gap-8">
        <div class="flex-1">
            <app-checkout-form [isProcessing]="isProcessing()" (submitPayment)="handlePayment()" />
        </div>

        <div class="w-full lg:w-96 bg-base-100 rounded-xl shadow-lg p-6 border border-base-200 h-fit sticky top-24">
            <h2 class="text-xl font-bold border-b border-base-200 pb-4 mb-4">Resumen del Pedido</h2>

            <div class="flex justify-between mb-2">
                <span class="text-base-content/80">Artículos ({{ cartService.totalItemsCount() }}):</span>
                <span class="font-medium">{{ cartService.cartTotal() | currency:'EUR' }}</span>
            </div>

            <div class="flex justify-between mb-4">
                <span class="text-base-content/80">Envío:</span>
                <span class="font-medium text-success">Gratis</span>
            </div>

            <div class="flex justify-between font-bold text-2xl border-t border-base-200 pt-4 mt-4">
                <span>Total a pagar:</span>
                <span>{{ cartService.cartTotal() | currency:'EUR' }}</span>
            </div>
        </div>
    </div>
</div>

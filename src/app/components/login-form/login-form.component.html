<div class="hero bg-base-200 min-h-screen">
  <div class="hero-content flex-col lg:flex-row-reverse w-full">
    <div class="card bg-base-100 w-full max-w-lg shrink-0 shadow-2xl">
      <div class="card-body">
        <form class="fieldset" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

          @if (errorMessage()) {
          <div class="alert alert-error mb-4">
            <span>{{ errorMessage() }}</span>
          </div>
          }

          <label class="label">Email</label>
          <input type="email" formControlName="email" class="input input-bordered w-full" placeholder="Email" />

          <label class="label">Contraseña</label>
          <input type="password" formControlName="password" class="input input-bordered w-full"
            placeholder="Password" />

          <div class="mt-2 text-center">
            <a class="link link-hover text-sm">¿Olvidaste la contraseña?</a>
          </div>

          <button type="submit" class="btn btn-neutral mt-4 w-full" [disabled]="loginForm.invalid || isLoading()">
            @if (isLoading()) {
            <span class="loading loading-spinner"></span>
            }
            Iniciar Sesión
          </button>

          <div class="mt-4 text-center">
            <a routerLink="/register" class="btn btn-link">¿No tienes cuenta? Regístrate</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

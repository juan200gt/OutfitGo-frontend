<nav class="navbar">
  <div class="navbar__logo" routerLink="/" style="cursor: pointer;">OUTFITGO</div>

  <ul class="navbar__links">
      <li><a routerLink="/products/men">HOMBRE</a></li>
      <li><a routerLink="/products/women">MUJER</a></li>
      <li><a routerLink="/products/kids">INFANTIL</a></li>
  </ul>

  <div class="navbar__icons">
      <div class="search-container">
          <input 
            type="text" 
            class="search-input" 
            [class.active]="isSearchVisible()" 
            placeholder="Buscar..."
            #searchInput
            (keyup.enter)="handleSearch(searchInput.value)">
          
          <img 
            src="https://img.icons8.com/ios-filled/30/ffffff/search.png" 
            alt="Search" 
            (click)="handleToggle()"
            style="cursor: pointer;">
      </div>

      <!-- Control de flujo Angular 19 para mostrar usuario o login según estado -->
      @if (isLoggedIn()) {
        <a routerLink="/profile"><img src="https://img.icons8.com/ios-filled/30/ffffff/user-male-circle.png" alt="Profile"></a>
      } @else {
        <a routerLink="/login"><img src="https://img.icons8.com/ios-filled/30/ffffff/user.png" alt="Login"></a>
      }

      <a routerLink="/cart" class="cart-icon">
          <img src="https://img.icons8.com/ios-filled/30/ffffff/shopping-cart.png" alt="Cart">
          <!-- Control de flujo Angular 19: Si hay items mostramos el badge -->
          @if (cartCount() > 0) {
            <span class="badge">{{ cartCount() }}</span>
          }
      </a>
  </div>
</nav>

<div class="navbar bg-base-100 shadow-sm">
  <div class="navbar-start">
    <div class="dropdown">
      <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
        </svg>
      </div>
      <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-[1] mt-3 w-52 p-2 shadow">
        <li><a routerLink="/products/men">HOMBRE</a></li>
        <li><a routerLink="/products/women">MUJER</a></li>
        <li><a routerLink="/products/kids">INFANTIL</a></li>
      </ul>
    </div>
    <a routerLink="/" class="btn btn-ghost text-xl">OutfitGo</a>
  </div>
  <div class="navbar-center hidden lg:flex">
    <ul class="menu menu-horizontal px-1">
      <li><a routerLink="/products/men">HOMBRE</a></li>
      <li><a routerLink="/products/women">MUJER</a></li>
      <li><a routerLink="/products/kids">INFANTIL</a></li>
    </ul>
  </div>
  <div class="navbar-end flex items-center gap-2">
    <!-- Icono Carrito de Compras -->
    <a routerLink="/cart" tabindex="0" role="button" class="btn btn-ghost btn-circle">
      <div class="indicator">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        @if (cartItemCount() > 0) {
        <span class="badge badge-sm indicator-item badge-primary">{{ cartItemCount() }}</span>
        }
      </div>
    </a>

    @if (isLoggedIn()) {
      <a routerLink="/profile" class="btn">Cuenta</a>
      <button (click)="onLogout()" class="btn">Cerrar sesión</button>
    } @else {
    <a routerLink="/login" class="btn">Entrar</a>
    }
  </div>
</div>

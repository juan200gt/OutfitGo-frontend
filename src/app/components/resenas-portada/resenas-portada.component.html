<section class="bg-slate-50 py-16">
    <div class="mx-auto max-w-7xl px-6 lg:px-8">
        <div class="mx-auto max-w-2xl text-center">
            <h2 class="text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl">Lo que dicen nuestros clientes</h2>
            <p class="mt-3 text-base text-slate-600">
                Reseñas reales de quienes ya compraron en OutfitGo.
            </p>
        </div>

        <div class="mt-12 grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
            <article *ngFor="let resena of resenas" class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
                <div class="mb-4 flex items-center gap-1">
                    <svg *ngFor="let _ of getEstrellas(resena.puntuacion)" class="h-5 w-5 text-yellow-400" viewBox="0 0 20 20"
                        fill="currentColor" aria-hidden="true">
                        <path
                            d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.176 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.069-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81H7.03a1 1 0 00.95-.69l1.07-3.292z" />
                    </svg>
                </div>

                <p class="text-slate-700">"{{ resena.comentario }}"</p>

                <div class="mt-6 border-t border-slate-100 pt-4">
                    <p class="text-sm font-semibold text-slate-900">{{ resena.user.name }}</p>
                    <p class="text-xs text-slate-500">{{ resena.created_at | date:'mediumDate' }}</p>
                </div>
            </article>
        </div>
    </div>
</section>

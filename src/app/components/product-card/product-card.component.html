<div 
    class="card bg-base-100 w-full shadow-sm relative overflow-hidden group hover:shadow-xl transition-all duration-300 cursor-pointer border border-base-200"
    [routerLink]="['/producto', product().slug]"
>
    <button 
        (click)="toggleFavorite($event)" 
        class="absolute top-3 right-3 z-20 btn btn-circle btn-sm bg-base-100/80 backdrop-blur-md border-none shadow-md"
        [class.text-red-500]="favoriteService.isFavorite(product().id)"
    >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" [attr.fill]="favoriteService.isFavorite(product().id) ? 'currentColor' : 'none'" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
        </svg>
    </button>

    <figure class="relative">
        <img 
            [src]="product().image" 
            [alt]="product().name" 
            class="object-cover h-64 w-full transition-transform duration-500 group-hover:scale-110" 
        />
    </figure>
    
    <div class="card-body p-5">
        <h2 class="card-title text-base font-bold line-clamp-2 group-hover:text-primary transition-colors">
            {{ product().name }}
            @if (product().category) {
                <div class="badge badge-secondary badge-sm">{{ product().category }}</div>
            }
        </h2>
        
        <div class="flex items-end justify-between mt-2">
            <span class="text-2xl font-black text-primary">{{ product().price | currency:'EUR' }}</span>
        </div>

        <div class="card-actions justify-start mt-3 opacity-70">
            @if (product().brand) {
                <div class="badge badge-ghost badge-sm font-medium">{{ product().brand }}</div>
            }
            @if (product().color) {
                <div class="badge badge-ghost badge-sm">{{ product().color }}</div>
            }
        </div>
    </div>
</div>

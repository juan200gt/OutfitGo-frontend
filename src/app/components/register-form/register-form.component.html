<div class="hero bg-base-200 min-h-screen">
    <div class="hero-content flex-col lg:flex-row-reverse w-full">
        <div class="card bg-base-100 w-full max-w-lg shrink-0 shadow-2xl">
            <div class="card-body">
                <form class="fieldset" [formGroup]="registerForm" (ngSubmit)="onSubmit()">

                    @if (errorMessage()) {
                    <div class="alert alert-error mb-4">
                        <span>{{ errorMessage() }}</span>
                    </div>
                    }

                    <label class="label">Nombre completo</label>
                    <input type="text" formControlName="name" class="input input-bordered w-full"
                        placeholder="Nombre completo" />

                    <label class="label">Correo electrónico</label>
                    <input type="email" formControlName="email" class="input input-bordered w-full"
                        placeholder="Correo electrónico" />

                    <label class="label">Contraseña</label>
                    <input type="password" formControlName="password" class="input input-bordered w-full"
                        placeholder="Contraseña" />

                    <label class="label">Confirmar contraseña</label>
                    <input type="password" formControlName="password_confirmation" class="input input-bordered w-full"
                        placeholder="Confirmar contraseña" />

                    <div class="form-control mt-2">
                        <label class="label cursor-pointer justify-start gap-2">
                            <input type="checkbox" formControlName="remember" class="checkbox checkbox-sm checkbox-primary" />
                            <span class="label-text">Recordarme</span>
                        </label>
                    </div>

                    <div class="form-control mt-1">
                        <label class="label cursor-pointer justify-start gap-2">
                            <input type="checkbox" formControlName="newsletter" class="checkbox checkbox-sm checkbox-primary" />
                            <span class="label-text">Suscribirse a la newsletter</span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-neutral mt-4 w-full"
                        [disabled]="registerForm.invalid || isLoading()">
                        @if (isLoading()) {
                        <span class="loading loading-spinner"></span>
                        }
                        Crear Cuenta
                    </button>

                    <div class="divider">O</div>

                    <button type="button" class="btn btn-outline w-full" (click)="submitGoogle.emit()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
                            <path fill="#FFC107"
                                d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
                            <path fill="#FF3D00"
                                d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
                            <path fill="#4CAF50"
                                d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
                            <path fill="#1976D2"
                                d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
                        </svg>
                        Continuar con Google
                    </button>

                    <div class="mt-4 text-center">
                        <a routerLink="/login" class="btn btn-link">¿Ya tienes cuenta? Inicia sesión</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

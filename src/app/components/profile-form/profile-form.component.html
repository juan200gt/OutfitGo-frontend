<div class="space-y-6">
  
  <div class="bg-base-100 p-6 rounded-lg shadow border border-base-200">
    <h2 class="text-xl font-semibold mb-4 border-b pb-2">{{ 'PROFILE.PERSONAL_DATA' | translate }}</h2>
    
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1">{{ 'AUTH.NAME' | translate }}</label>
          <input type="text" formControlName="name" 
                 class="w-full input input-bordered">
        </div>
        
        <div>
          <label class="block text-sm font-medium mb-1">{{ 'AUTH.EMAIL' | translate }}</label>
          <input type="email" formControlName="email" 
                 class="w-full input input-bordered">
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-medium mb-1">{{ 'AUTH.PASSWORD' | translate }} ({{ 'COMMON.OPTIONAL' | translate }})</label>
          <input type="password" formControlName="password" [placeholder]="'PROFILE.PASSWORD_PLACEHOLDER' | translate"
                 class="w-full input input-bordered">
        </div>
      </div>

      <div class="flex justify-end pt-4">
        <button type="submit" [disabled]="isLoading() || profileForm.invalid"
                class="btn btn-primary">
          @if (isLoading()) {
            <span class="loading loading-spinner"></span>
            {{ 'COMMON.LOADING' | translate }}
          } @else {
            {{ 'COMMON.SAVE' | translate }}
          }
        </button>
      </div>
    </form>
  </div>
</div>

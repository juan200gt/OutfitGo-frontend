<div class="space-y-6">
  
  <div class="bg-base-100 p-6 rounded-lg shadow border border-base-200">
    <h2 class="text-xl font-semibold mb-4 border-b pb-2">Datos Personales</h2>
    
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1">Nombre completo</label>
          <input type="text" formControlName="name" 
                 class="w-full input input-bordered">
        </div>
        
        <div>
          <label class="block text-sm font-medium mb-1">Correo electrónico</label>
          <input type="email" formControlName="email" 
                 class="w-full input input-bordered">
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-medium mb-1">Contraseña (Opcional)</label>
          <input type="password" formControlName="password" placeholder="Déjalo en blanco para mantener la actual"
                 class="w-full input input-bordered">
        </div>
      </div>

      <div class="flex justify-end pt-4">
        <button type="submit" [disabled]="isLoading() || profileForm.invalid"
                class="btn btn-primary">
          @if (isLoading()) {
            <span class="loading loading-spinner"></span>
            Cargando...
          } @else {
            Guardar
          }
        </button>
      </div>
    </form>
  </div>
</div>

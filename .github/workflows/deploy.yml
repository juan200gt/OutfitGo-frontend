name: Deploy Frontend to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            # Instalar Docker si no existe
            if ! command -v docker &> /dev/null; then
              echo "Instalando Docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker ubuntu
              sleep 10
            fi

            # Crear Swap de 2GB si no existe
            if [ ! -f /swapfile ]; then
              echo "Creando archivo Swap de 2GB..."
              sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi

            mkdir -p /home/ubuntu/frontend
            cd /home/ubuntu/frontend
            if [ ! -d ".git" ]; then
              git clone -b main https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi

            # Bajamos contenedores anteriores (liberamos puerto 80)
            sudo docker compose down --remove-orphans

            # Instalar Certbot y generar certificado si no existe
            if ! command -v certbot &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y certbot
            fi
            if [ ! -d "/etc/letsencrypt/live/outfitgo.duckdns.org" ]; then
              sudo certbot certonly --standalone -d outfitgo.duckdns.org --non-interactive --agree-tos -m admin@outfitgo.duckdns.org
            fi

            # Levantamos el sistema completo y compilamos la nueva imagen
            sudo docker compose up -d --build
